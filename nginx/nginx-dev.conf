error_log /dev/stdout info;
error_log stderr emerg;

worker_processes auto;
worker_rlimit_nofile 32768;
worker_shutdown_timeout 1d;

events {
    worker_connections 8192;
}

http {
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;

    root /usr/share/nginx/html;
    index index.html;

    include mime.types;
    default_type application/octet-stream;


    types {
        application/javascript  js mjs;
        font/woff2              woff2;
    }

    charset utf-8;
    charset_types text/css text/javascript text/plain text/xml application/atom+xml;

    keepalive_requests 16;
    keepalive_timeout 65;
    server_tokens off;
    msie_padding off;

    client_max_body_size 1k;
    client_body_buffer_size 1k;
    client_header_buffer_size 1k;
    large_client_header_buffers 2 1k;
    http2_chunk_size 4k;

    reset_timedout_connection on;
    client_body_timeout 15s;
    client_header_timeout 15s;
    send_timeout 30s;

    max_ranges 1;

    resolver 127.0.0.11 ipv6=off;
    resolver_timeout 5s;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;

    access_log /dev/stdout;
    error_log /dev/stderr warn;

    # Карта для определения языка из cookie
    map $cookie_lang $lang_from_cookie {
        default "";
        "~^(en|de|fr|es|ru)$" $1;
    }

    # Карта для определения языка из Accept-Language
    map $http_accept_language $lang_from_accept {
        default "";
        "~^([a-z]{2})" $1;
    }

    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name localhost grapheneostest.org;

        root /usr/share/nginx/html;
        index index.html;

        # Глобальный Vary заголовок для всех ответов
        add_header Vary "Accept-Language, Cookie, Accept-Encoding" always;

        # Статические ресурсы (кеш 30 дней, так как они не меняются)
        location ~* ^/(.+\.(css|js|svg|png|jpg|jpeg|gif|ico|woff2?|ttf|eot|webmanifest|xml|txt|atom))$ {
            try_files $uri /en/$uri /ru/$uri /de/$uri /fr/$uri /es/$uri =404;
            expires 30d;
            add_header Cache-Control "public, immutable";
            # Для статики Vary только по Accept-Encoding
            add_header Vary "Accept-Encoding";
        }

        # HTML страницы (кеш 5-10 минут, так как контент может обновляться)
        location / {
            # Разное время кеша для разных типов страниц
            set $cache_time "5m";

            # Главная страница — кеш 1 минута (часто обновляется)
            if ($uri = "/") {
                set $cache_time "1m";
            }

            # Releases страница — кеш 1 минута (часто обновляется)
            if ($uri ~ "^/(de|fr|es|ru)?/?releases") {
                set $cache_time "1m";
            }

            # FAQ и Features — кеш 1 час (редко обновляются)
            if ($uri ~ "^/(de|fr|es|ru)?/?(faq|features|usage)") {
                set $cache_time "1h";
            }

            expires $cache_time;
            add_header Cache-Control "public, must-revalidate";

            try_files $uri $uri.html $uri/ $uri/index.html =404;
        }

        # Языковые версии страниц
        location ~ ^/(de|fr|es|ru)/(.*)$ {
            set $lang $1;
            set $page $2;

            if ($page = "") {
                set $page "index";
            }

            # Кеш для языковых страниц
            expires 5m;
            add_header Cache-Control "public, must-revalidate";

            try_files /$lang/$page.html /$lang/$page/index.html /$lang/$page =404;
        }

        # Корневой редирект с определением языка
        location = / {
            # Если есть cookie с языком
            if ($lang_from_cookie) {
                return 302 /$lang_from_cookie/;
            }

            # Если есть Accept-Language
            if ($lang_from_accept ~* ^(de|fr|es|ru)$) {
                return 302 /$lang_from_accept/;
            }

            # По умолчанию английский
            return 302 /en/;
        }

        # SEO: robots.txt
        location = /robots.txt {
            try_files /robots.txt /en/robots.txt /ru/robots.txt =404;
            expires 1d;
            add_header Cache-Control "public, must-revalidate";
        }

        # Sitemap
        location ~ ^/sitemap.*\.xml$ {
            types {
                application/xml xml;
            }
            try_files $uri /sitemap_index.xml =404;
            expires 1d;
            add_header Cache-Control "public, immutable";
            add_header Access-Control-Allow-Origin "*";
        }

        # Сжатые версии sitemap
        location ~ ^/sitemap.*\.xml\.(gz|br)$ {
            try_files $uri =404;
            expires 1d;
            add_header Cache-Control "public, immutable";

            if ($uri ~ \.gz$) {
                add_header Content-Encoding gzip;
                add_header Content-Type application/xml;
            }
            if ($uri ~ \.br$) {
                add_header Content-Encoding br;
                add_header Content-Type application/xml;
            }
        }

        # 404 обработка
        error_page 404 = @handle_404;

        location @handle_404 {
            set $lang en;

            if ($uri ~ ^/(de|fr|es|ru)/) {
                set $lang $1;
            }

            try_files /$lang/404.html =404;
        }

        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }
}