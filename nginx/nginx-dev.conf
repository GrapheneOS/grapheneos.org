error_log /dev/stdout info;
error_log stderr emerg;

worker_processes auto;
worker_rlimit_nofile 32768;
worker_shutdown_timeout 1d;

events {
    worker_connections 8192;
}

http {
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;

    root /usr/share/nginx/html;
    index index.html;

    include mime.types;
    default_type application/octet-stream;

    charset utf-8;
    charset_types text/css text/javascript text/plain text/xml application/atom+xml;

    keepalive_requests 16;
    keepalive_timeout 65;
    server_tokens off;
    msie_padding off;

    client_max_body_size 1k;
    client_body_buffer_size 1k;
    client_header_buffer_size 1k;
    large_client_header_buffers 2 1k;
    http2_chunk_size 4k;

    reset_timedout_connection on;
    client_body_timeout 15s;
    client_header_timeout 15s;
    send_timeout 30s;

    max_ranges 1;

    resolver 127.0.0.11 ipv6=off;
    resolver_timeout 5s;
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;


    access_log /dev/stdout;
    error_log /dev/stderr warn;


    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name localhost grapheneostest.org;

        root /usr/share/nginx/html;
        index index.html;


        location ~* ^/(.+\.(css|js|svg|png|jpg|jpeg|gif|ico|woff2?|ttf|eot|webmanifest|xml|txt|atom))$ {
            try_files $uri =404;
            expires 1d;
            add_header Cache-Control "public, immutable";
        }


        location / {
            try_files $uri $uri.html $uri/ $uri/index.html =404;
        }


        location ~ ^/(de|fr|es|ru)/(.*)$ {
            set $lang $1;
            set $page $2;


            if ($page = "") {
                set $page "index";
            }


            try_files /$lang/$page.html /$lang/$page/index.html /$lang/$page =404;
        }


        location = / {

            if ($cookie_lang ~* ^(de|fr|es|ru)$) {
                return 302 /$cookie_lang/;
            }

            if ($http_accept_language ~* ^(de|fr|es|ru)) {
                set $lang $1;
                return 302 /$lang/;
            }

            return 302 /en/;
        }


        error_page 404 /404.html;
        location = /404.html {
            internal;
        }


        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }
}